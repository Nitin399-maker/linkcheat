name: LinkedIn PDF Auto-Poster

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC
    - cron: "30 3 * * *"
    # 5:00 PM IST = 11:30 UTC
    - cron: "30 11 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  post-to-linkedin:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit the updated tracker back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn posting pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python main.py

      - name: Commit updated tracker
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posted_tracker.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: mark PDF as posted [skip ci]"
          git push
